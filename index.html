<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Розыгрыш мерча</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4fb; min-height: 100vh; }

  .screen { display: none; padding: 1.5rem 1rem; max-width: 480px; margin: 0 auto; }
  .screen.active { display: block; }

  h1 { font-size: 22px; font-weight: 600; color: #1a1a2e; margin-bottom: 0.4rem; }
  .subtitle { font-size: 14px; color: #6b6b8a; margin-bottom: 1.5rem; }

  .card { background: #fff; border: 1px solid #e8e6f5; border-radius: 14px; padding: 1.1rem 1.25rem; margin-bottom: 1rem; }

  label { display: block; font-size: 13px; color: #6b6b8a; margin-bottom: 5px; }
  input {
    width: 100%; padding: 11px 13px; border: 1px solid #ddd9f5;
    border-radius: 10px; font-size: 15px; background: #fff; color: #1a1a2e;
    margin-bottom: 1rem; outline: none;
  }
  input:focus { border-color: #7F77DD; box-shadow: 0 0 0 3px #eeedfe; }

  .btn-primary {
    width: 100%; padding: 14px; background: #534AB7; color: #fff;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: transform 0.1s;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: #c5c2e8; cursor: default; }

  .btn-secondary {
    width: 100%; padding: 12px; background: transparent; color: #534AB7;
    border: 1.5px solid #534AB7; border-radius: 10px; font-size: 14px;
    cursor: pointer; margin-top: 8px;
  }

  .error { font-size: 13px; color: #c0392b; margin-top: -0.5rem; margin-bottom: 0.75rem; }

  .user-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #eeedfe; color: #3C3489; border-radius: 20px;
    padding: 5px 12px; font-size: 13px; font-weight: 500; margin-bottom: 1rem;
  }

  /* Attempts */
  .attempts-label { font-size: 12px; color: #6b6b8a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .attempts-bar { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .attempt-dot { flex: 1; height: 7px; border-radius: 4px; background: #e8e6f5; transition: background 0.4s; }
  .attempt-dot.used { background: #7F77DD; }

  /* Roulette */
  .roulette-wrap { position: relative; margin: 8px 0 16px; }
  .roulette-shadow-l {
    position: absolute; left: 0; top: 0; bottom: 0; width: 60px; z-index: 5;
    background: linear-gradient(to right, #f5f4fb, transparent); pointer-events: none;
  }
  .roulette-shadow-r {
    position: absolute; right: 0; top: 0; bottom: 0; width: 60px; z-index: 5;
    background: linear-gradient(to left, #f5f4fb, transparent); pointer-events: none;
  }
  .slot-pointer {
    position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 2px; background: #E24B4A; z-index: 10;
  }
  .slot-pointer::before { content: '▼'; position: absolute; top: -18px; left: 50%; transform: translateX(-50%); color: #E24B4A; font-size: 13px; }
  .slot-pointer::after  { content: '▲'; position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); color: #E24B4A; font-size: 13px; }

  .slots-outer { overflow: hidden; border-radius: 12px; border: 2px solid #7F77DD; height: 72px; background: #faf9fe; }
  .slots-track { display: flex; align-items: center; height: 72px; will-change: transform; }

  .slot-item {
    min-width: 124px; width: 124px; height: 62px; margin: 0 4px;
    border-radius: 10px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .slot-item .s-icon { font-size: 24px; margin-bottom: 2px; }
  .slot-item .s-name { font-size: 11px; font-weight: 600; text-align: center; }

  .s-c0 { background: #EEEDFE; color: #3C3489; }
  .s-c1 { background: #E1F5EE; color: #085041; }
  .s-c2 { background: #FAEEDA; color: #633806; }
  .s-c3 { background: #FBEAF0; color: #72243E; }

  .spin-hint { text-align: center; font-size: 13px; color: #6b6b8a; margin: 10px 0 12px; min-height: 20px; }

  /* Results */
  .result-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0eef9; }
  .result-item:last-child { border-bottom: none; }
  .result-icon { font-size: 22px; width: 38px; text-align: center; }
  .result-name { font-size: 14px; font-weight: 600; color: #1a1a2e; }
  .result-sub  { font-size: 12px; color: #6b6b8a; }

  /* Done screen */
  .done-hero { text-align: center; padding: 2rem 0 1.5rem; }
  .done-emoji { font-size: 52px; margin-bottom: 0.75rem; }
  .done-title { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 0.4rem; }
  .done-sub   { font-size: 14px; color: #6b6b8a; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #2c2060; color: #fff; padding: 11px 20px;
    border-radius: 24px; font-size: 13px; z-index: 999;
    opacity: 0; transition: opacity 0.25s; pointer-events: none;
    white-space: nowrap; max-width: 90vw;
  }
  .toast.show { opacity: 1; }

  /* Admin */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .stat-box { background: #fff; border: 1px solid #e8e6f5; border-radius: 12px; padding: 0.9rem 1rem; }
  .stat-label { font-size: 11px; color: #6b6b8a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-val   { font-size: 26px; font-weight: 700; color: #1a1a2e; }

  .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .btn-sm { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #ddd9f5; background: #fff; color: #534AB7; }
  .btn-sm.danger { color: #c0392b; border-color: #f5c6c2; }

  .tbl-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid #e8e6f5; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 340px; }
  th { background: #f5f4fb; color: #6b6b8a; padding: 9px 12px; text-align: left; font-weight: 600; border-bottom: 1px solid #e8e6f5; }
  td { padding: 9px 12px; border-bottom: 1px solid #f0eef9; color: #1a1a2e; }
  tr:last-child td { border-bottom: none; }

  .admin-link { text-align: center; margin-top: 1.75rem; }
  .admin-link a { font-size: 12px; color: #a09ec8; cursor: pointer; text-decoration: underline; }

  .loading { text-align: center; padding: 2rem; color: #6b6b8a; font-size: 14px; }
</style>
</head>
<body>

<div id="app">

  <!-- LOGIN -->
  <div id="screen-login" class="screen active">
    <div style="padding-top: 1rem;">
      <h1>🎁 Розыгрыш мерча</h1>
      <p class="subtitle">Введи свои данные, чтобы начать</p>
      <div class="card">
        <label>ФИО</label>
        <input id="inp-name" type="text" placeholder="Иванов Иван Иванович" autocomplete="off">
        <label>Номер рабочего места</label>
        <input id="inp-seat" type="text" placeholder="например: A-205" autocomplete="off">
        <div id="login-error" class="error" style="display:none"></div>
        <button class="btn-primary" onclick="doLogin()">Начать розыгрыш →</button>
      </div>
      <div class="admin-link"><a onclick="showAdmin()">Панель администратора</a></div>
    </div>
  </div>

  <!-- SPIN -->
  <div id="screen-spin" class="screen">
    <h1>Крути рулетку</h1>
    <div id="spin-user-badge" class="user-badge"></div>

    <div class="attempts-label">Попытки</div>
    <div class="attempts-bar" id="attempts-bar">
      <div class="attempt-dot"></div>
      <div class="attempt-dot"></div>
    </div>

    <div class="roulette-wrap">
      <div class="roulette-shadow-l"></div>
      <div class="roulette-shadow-r"></div>
      <div class="slot-pointer"></div>
      <div class="slots-outer">
        <div class="slots-track" id="slots-track"></div>
      </div>
    </div>

    <div class="spin-hint" id="spin-hint">Нажми «Крутить!» и получи свой мерч</div>
    <button class="btn-primary" id="btn-spin" onclick="doSpin()">🎰 Крутить!</button>

    <div id="result-section" style="display:none; margin-top:1.25rem;">
      <div class="card">
        <div class="attempts-label" style="margin-bottom:0.5rem;">Твой мерч</div>
        <div id="result-list"></div>
      </div>
    </div>
  </div>

  <!-- DONE -->
  <div id="screen-done" class="screen">
    <div class="done-hero">
      <div class="done-emoji">🎉</div>
      <div class="done-title">Готово!</div>
      <div class="done-sub" id="done-sub"></div>
    </div>
    <div class="card">
      <div class="attempts-label" style="margin-bottom:0.5rem;">Твой мерч</div>
      <div id="done-result-list"></div>
    </div>
    <button class="btn-secondary" onclick="goBack()">← Новый участник</button>
  </div>

  <!-- ADMIN -->
  <div id="screen-admin" class="screen">
    <div class="admin-header">
      <h1>📊 Результаты</h1>
      <button class="btn-sm" onclick="goBack()">← Назад</button>
    </div>
    <div id="admin-stats" class="stat-grid"></div>
    <div style="display:flex; gap:8px; margin-bottom:1rem; flex-wrap:wrap;">
      <button class="btn-primary" style="width:auto; padding:9px 16px; font-size:13px;" onclick="exportCSV()">⬇ Скачать CSV</button>
      <button class="btn-sm danger" onclick="clearData()">Очистить всё</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>ФИО</th><th>Место</th><th>Мерч 1</th><th>Мерч 2</th><th>Дата</th></tr></thead>
        <tbody id="admin-tbody"><tr><td colspan="5" class="loading">Загрузка...</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  НАСТРОЙКИ — вставь свои данные Supabase
// ─────────────────────────────────────────────
const SUPABASE_URL = 'https://ntgpmfzoiikfcuirsnsc.supabase.co';   // ← сюда
const SUPABASE_KEY = 'sb_publishable_jFf4h8d-8V6Ta0omGQEwLw_hCABEdC9';                      // ← сюда
const TABLE = 'results';
// ─────────────────────────────────────────────

const MERCH = [
  { name: 'Маска для сна', icon: '😴', cls: 's-c0' },
  { name: 'Шопер',         icon: '🛍️', cls: 's-c1' },
  { name: 'Футболка',      icon: '👕', cls: 's-c2' },
  { name: 'Блокнот',       icon: '📓', cls: 's-c3' },
];
const MAX_ATTEMPTS = 2;

let currentUser = null;
let spinning = false;
let spunItems = [];
let attemptsUsed = 0;

// ── Supabase helpers ──────────────────────────
async function sbInsert(row) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify(row)
  });
  if (!r.ok) throw new Error(await r.text());
}

async function sbCheckExists(name, seat) {
  const r = await fetch(
    `${SUPABASE_URL}/rest/v1/${TABLE}?name=eq.${encodeURIComponent(name)}&seat=eq.${encodeURIComponent(seat)}&select=id`,
    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
  );
  const data = await r.json();
  return data.length > 0;
}

async function sbGetAll() {
  const r = await fetch(
    `${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=created_at.desc`,
    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
  );
  return r.json();
}

async function sbDeleteAll() {
  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=neq.00000000-0000-0000-0000-000000000000`, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
}

// ── UI helpers ────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg, dur = 2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function setError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

// ── Login ─────────────────────────────────────
async function doLogin() {
  const name = document.getElementById('inp-name').value.trim();
  const seat = document.getElementById('inp-seat').value.trim();
  if (!name || !seat) { setError('Заполни оба поля'); return; }
  setError('');

  const btn = document.querySelector('#screen-login .btn-primary');
  btn.disabled = true; btn.textContent = 'Проверяем...';

  try {
    const exists = await sbCheckExists(name, seat);
    if (exists) {
      setError('Этот участник уже прошёл розыгрыш.');
      btn.disabled = false; btn.textContent = 'Начать розыгрыш →';
      return;
    }
  } catch(e) {
    setError('Ошибка соединения. Проверь настройки Supabase.');
    btn.disabled = false; btn.textContent = 'Начать розыгрыш →';
    return;
  }

  currentUser = { name, seat };
  spunItems = []; attemptsUsed = 0;
  btn.disabled = false; btn.textContent = 'Начать розыгрыш →';
  initSpinScreen();
  show('screen-spin');
}

// ── Spin screen ───────────────────────────────
function initSpinScreen() {
  document.getElementById('spin-user-badge').textContent = `${currentUser.name} · ${currentUser.seat}`;
  updateDots();
  buildTrack();
  centerTrack(0);
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('result-list').innerHTML = '';
  document.getElementById('spin-hint').textContent = 'Нажми «Крутить!» и получи свой мерч';
  document.getElementById('btn-spin').disabled = false;
  document.getElementById('btn-spin').textContent = '🎰 Крутить!';
}

function updateDots() {
  document.querySelectorAll('.attempt-dot').forEach((d, i) =>
    d.classList.toggle('used', i < attemptsUsed));
}

function buildTrack(highlightIdx) {
  const track = document.getElementById('slots-track');
  track.innerHTML = '';
  for (let i = 0; i < 48; i++) {
    const m = MERCH[i % MERCH.length];
    const el = document.createElement('div');
    el.className = `slot-item ${m.cls}`;
    el.innerHTML = `<span class="s-icon">${m.icon}</span><span class="s-name">${m.name}</span>`;
    track.appendChild(el);
  }
}

function centerTrack(idx) {
  const track = document.getElementById('slots-track');
  const wrapW = document.querySelector('.slots-outer').offsetWidth;
  const itemW = 132;
  track.style.transition = 'none';
  track.style.transform = `translateX(${wrapW / 2 - itemW / 2 - idx * itemW}px)`;
}

function renderResultList(container) {
  container.innerHTML = '';
  spunItems.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'result-item';
    el.innerHTML = `<span class="result-icon">${m.icon}</span>
      <div><div class="result-name">${m.name}</div>
      <div class="result-sub">Попытка ${i + 1}</div></div>`;
    container.appendChild(el);
  });
}

function doSpin() {
  if (spinning || attemptsUsed >= MAX_ATTEMPTS) return;
  spinning = true;
  document.getElementById('btn-spin').disabled = true;
  document.getElementById('spin-hint').textContent = '🎲 Крутим...';

  const track = document.getElementById('slots-track');
  const wrapW = document.querySelector('.slots-outer').offsetWidth;
  const itemW = 132;
  const total = 48;
  const extraSpins = 6 + Math.floor(Math.random() * 4);
  const targetIdx = Math.floor(Math.random() * total);
  const finalOffset = wrapW / 2 - itemW / 2 - targetIdx * itemW;
  const spinOffset = finalOffset - extraSpins * total * itemW / 6;
  const duration = 2.2 + extraSpins * 0.15;

  track.style.transition = `transform ${duration}s cubic-bezier(0.23,1,0.32,1)`;
  track.style.transform = `translateX(${spinOffset}px)`;

  setTimeout(() => {
    // snap to final
    track.style.transition = 'none';
    track.style.transform = `translateX(${finalOffset}px)`;

    const realIdx = ((targetIdx % MERCH.length) + MERCH.length) % MERCH.length;
    const won = MERCH[realIdx];

    if (spunItems.some(s => s.name === won.name)) {
      showToast('Такой мерч уже есть! Крути ещё раз — попытка сохраняется 🔄', 3200);
      spinning = false;
      setTimeout(() => { buildTrack(); centerTrack(0); }, 400);
      document.getElementById('btn-spin').disabled = false;
      document.getElementById('spin-hint').textContent = 'Повезёт в следующий раз! Попробуй снова';
      return;
    }

    attemptsUsed++;
    spunItems.push(won);
    updateDots();
    showToast(`🎉 ${won.name}!`);
    document.getElementById('spin-hint').textContent = `+${won.name}`;

    renderResultList(document.getElementById('result-list'));
    document.getElementById('result-section').style.display = 'block';

    if (attemptsUsed >= MAX_ATTEMPTS) {
      setTimeout(finishSession, 900);
    } else {
      spinning = false;
      document.getElementById('btn-spin').disabled = false;
      document.getElementById('btn-spin').textContent = '🎰 Крутить ещё!';
    }
  }, duration * 1000 + 80);
}

// ── Finish ────────────────────────────────────
async function finishSession() {
  document.getElementById('btn-spin').textContent = 'Сохраняем...';
  try {
    await sbInsert({
      name: currentUser.name,
      seat: currentUser.seat,
      merch_1: spunItems[0]?.name || null,
      merch_2: spunItems[1]?.name || null,
    });
  } catch(e) {
    showToast('Ошибка сохранения! Запиши мерч вручную.', 5000);
  }

  renderResultList(document.getElementById('done-result-list'));
  document.getElementById('done-sub').textContent =
    `${currentUser.name}, твой мерч записан! Подойди к организатору для получения.`;
  show('screen-done');
  spinning = false;
}

// ── Admin ─────────────────────────────────────
async function showAdmin() {
  show('screen-admin');
  const tbody = document.getElementById('admin-tbody');
  tbody.innerHTML = '<tr><td colspan="5" class="loading">Загрузка...</td></tr>';
  const rows = await sbGetAll();
  renderAdminTable(rows);
}

function renderAdminTable(rows) {
  const tbody = document.getElementById('admin-tbody');
  tbody.innerHTML = rows.length === 0
    ? '<tr><td colspan="5" class="loading">Нет данных</td></tr>'
    : rows.map(r => `<tr>
        <td>${r.name}</td>
        <td>${r.seat}</td>
        <td>${r.merch_1 || '—'}</td>
        <td>${r.merch_2 || '—'}</td>
        <td>${r.created_at ? r.created_at.slice(0,10) : '—'}</td>
      </tr>`).join('');

  document.getElementById('admin-stats').innerHTML = `
    <div class="stat-box"><div class="stat-label">Участников</div><div class="stat-val">${rows.length}</div></div>
    <div class="stat-box"><div class="stat-label">Позиций выдано</div><div class="stat-val">${rows.reduce((s,r)=>(s+(r.merch_1?1:0)+(r.merch_2?1:0)),0)}</div></div>
  `;
}

async function exportCSV() {
  const rows = await sbGetAll();
  if (!rows.length) { showToast('Нет данных'); return; }
  let csv = 'ФИО,Рабочее место,Мерч 1,Мерч 2,Дата\n';
  rows.forEach(r => {
    csv += `"${r.name}","${r.seat}","${r.merch_1||''}","${r.merch_2||''}","${r.created_at?r.created_at.slice(0,10):''}"\n`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'}));
  a.download = 'merch_results.csv'; a.click();
  showToast('CSV скачан ✓');
}

async function clearData() {
  if (!confirm('Удалить ВСЕ результаты? Это нельзя отменить.')) return;
  await sbDeleteAll();
  showToast('Данные удалены');
  showAdmin();
}

function goBack() {
  currentUser = null;
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-seat').value = '';
  show('screen-login');
}
</script>
</body>
</html>
