.screen{display:none;min-height:100vh;flex-direction:column;position:relative;z-index:1}
.screen.active{display:flex}

/* LOGO */
.logo-wrap{display:flex;justify-content:center;padding:44px 0 0}
.logo-para{width:36px;height:20px;background:#fff;clip-path:polygon(15% 0%,100% 0%,85% 100%,0% 100%)}
.footer{text-align:center;font-size:12px;line-height:1.5;opacity:.55;padding:0 24px 36px;margin-top:auto}

/* ══ LOGIN ══ */
.login-mid{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px 24px 16px}
.login-title{font-size:34px;font-weight:800;letter-spacing:-.02em;text-align:center;margin-bottom:14px}
.login-sub{font-size:16px;text-align:center;opacity:.9;margin-bottom:20px}
.login-card{width:100%;background:#fff;border-radius:22px;padding:24px 20px 20px;color:#1a1a2e}
.lc-label{font-size:13px;color:#888;font-weight:500;margin-bottom:4px;display:block}
.lc-input{width:100%;border:none;border-bottom:1.5px solid #e0e0e0;padding:10px 0;font-size:16px;color:#1a1a2e;font-family:inherit;outline:none;background:transparent;margin-bottom:18px}
.lc-input::placeholder{color:#bbb}
.lc-input:focus{border-bottom-color:#1a7fd4}
.lc-error{font-size:13px;color:#e53935;margin:-10px 0 10px;font-weight:500}
.btn-grad{width:100%;border:none;border-radius:11px;padding:15px;font-size:14px;font-weight:700;font-family:inherit;text-transform:uppercase;letter-spacing:.09em;cursor:pointer;color:#fff;background:linear-gradient(90deg,#24A0F2 0%,#0026AA 100%);transition:transform .1s,opacity .1s}
.btn-grad:active{transform:scale(.97)}
.btn-grad:disabled{opacity:.4;cursor:default}
.admin-row{text-align:center;padding:14px 0 6px}
.admin-link{font-size:12px;opacity:.4;cursor:pointer;text-decoration:underline;text-underline-offset:2px}

/* ══ SPIN ══ */
.spin-top{padding:36px 24px 0}
.spin-title{font-size:38px;font-weight:900;letter-spacing:-.02em;margin-bottom:8px}
.user-chip{display:inline-flex;align-items:center;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:100px;padding:5px 14px;font-size:13px;font-weight:500}

/* white reel — full width, no side padding */
.reel-section{
  flex:1;
  position:relative;
  background:#fff;
  overflow:hidden;
  min-height:320px;
  margin-top:16px;
}

/* arrows: centered vertically, hanging off the edges */
.arr{position:absolute;top:50%;transform:translateY(-50%);z-index:20;pointer-events:none;line-height:0}
.arr-l{left:-6px}
.arr-r{right:-6px}

/* top/bottom fade on white */
.reel-ft{position:absolute;top:0;left:0;right:0;height:110px;z-index:5;background:linear-gradient(to bottom,#fff 0%,rgba(255,255,255,0) 100%);pointer-events:none}
.reel-fb{position:absolute;bottom:0;left:0;right:0;height:110px;z-index:5;background:linear-gradient(to top,#fff 0%,rgba(255,255,255,0) 100%);pointer-events:none}

.reel-inner{position:absolute;inset:0;display:flex;justify-content:center;overflow:hidden}
.reel-track{display:flex;flex-direction:column;align-items:center;will-change:transform}
.reel-item{width:100vw;max-width:480px;height:260px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0 70px}
.reel-item img{max-width:100%;max-height:240px;object-fit:contain;mix-blend-mode:multiply}

/* ── bottom panel ── */
.spin-bottom{padding:16px 24px 36px}

/* gradient button */
.spin-btn-wrap{position:relative;width:100%;height:54px;margin-bottom:16px}
.spin-btn-bg{position:absolute;inset:0;width:100%;height:100%;border:none;border-radius:13px;cursor:pointer;background:linear-gradient(90deg,#24A0F2 0%,#0026AA 100%);transition:transform .1s,opacity .1s}
.spin-btn-bg:active{transform:scale(.97)}
.spin-btn-bg:disabled{opacity:.4;cursor:default}
.spin-btn-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;letter-spacing:.06em;color:#fff;pointer-events:none}

/* counter + pill row */
.ctr-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ctr-num{font-size:22px;font-weight:800;color:#24A0F2;flex-shrink:0}
.won-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.28);border-radius:100px;padding:6px 14px;font-size:13px;font-weight:500;flex-wrap:wrap}
.won-sep{width:6px;height:6px;border-radius:50%;background:#24A0F2;flex-shrink:0}

.info-row{display:flex;justify-content:space-between;margin-top:10px;font-size:12px;opacity:.4}

/* ══ DONE ══ */
.done-mid{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 24px}
.done-big{font-size:58px;font-weight:900;letter-spacing:-.03em;margin-bottom:22px}
.done-card{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:20px;font-size:16px;line-height:1.6;font-weight:500;margin-bottom:16px}
.done-note{font-size:14px;opacity:.7;line-height:1.55;text-align:center}
.btn-outline{width:100%;margin-top:24px;background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.45);border-radius:14px;padding:16px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-outline:active{background:rgba(255,255,255,.1)}

/* ══ ADMIN ══ */
.admin-body{flex:1;padding:48px 20px 36px}
.admin-title{font-size:24px;font-weight:800;margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:14px 16px}
.stat-lbl{font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.stat-val{font-size:30px;font-weight:800}
.act-row{display:flex;gap:8px;margin-bottom:14px}
.btn-sm{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.12);color:#fff;font-family:inherit}
.btn-sm.red{border-color:#ff6b6b;color:#ff8a8a}
.tbl-box{overflow-x:auto;border-radius:14px;border:1px solid rgba(255,255,255,.18)}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:320px}
th{background:rgba(255,255,255,.12);color:rgba(255,255,255,.75);padding:9px 12px;text-align:left;font-weight:700}
td{padding:9px 12px;border-top:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.88)}
.back-btn{font-size:13px;opacity:.6;cursor:pointer;margin-bottom:16px;display:inline-block}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(10,25,70,.85);color:#fff;padding:13px 24px;border-radius:100px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .22s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="bg"></div>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="logo-wrap"><div class="logo-para"></div></div>
  <div class="login-mid">
    <div class="login-title">🎁 Розыгрыш мерча</div>
    <div class="login-sub">Введи свои данные, чтобы начать</div>
    <div class="login-card">
      <label class="lc-label">ФИО</label>
      <input class="lc-input" id="inp-name" type="text" placeholder="Иванов Иван Иванович" autocomplete="off">
      <label class="lc-label">Номер рабочего места</label>
      <input class="lc-input" id="inp-seat" type="text" placeholder="например: А-205" autocomplete="off">
      <div id="login-error" class="lc-error" style="display:none"></div>
      <button class="btn-grad" id="btn-login" onclick="doLogin()">получить штуки</button>
    </div>
  </div>
  <div class="admin-row"><span class="admin-link" onclick="showAdmin()">панель администратора</span></div>
  <div class="footer">департамент<br>цифрового бизнеса</div>
</div>

<!-- SPIN -->
<div id="screen-spin" class="screen">
  <div class="spin-top">
    <div class="spin-title">крути!</div>
    <div class="user-chip" id="spin-chip"></div>
  </div>

  <div class="reel-section" id="reel-section">

    <div class="arr arr-r"><svg width="54" height="59" viewBox="0 0 54 59" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5.49999 38.7292C-1.83334 34.4953 -1.83334 23.9106 5.5 19.6767L37 1.49012C44.3333 -2.74378 53.5 2.5486 53.5 11.0164L53.5 47.3895C53.5 55.8573 44.3333 61.1497 37 56.9158L5.49999 38.7292Z" fill="url(#ar)"/><defs><linearGradient id="ar" x1="32" y1="72.2029" x2="32" y2="-13.7971" gradientUnits="userSpaceOnUse"><stop stop-color="#24A0F2"/><stop offset="1" stop-color="#0026AA"/></linearGradient></defs></svg></div>

    <div class="reel-fb"></div>
    <div class="reel-inner">
      <div class="reel-track" id="reel-track"></div>
    </div>
  </div>

  <div class="spin-bottom">
    <div class="spin-btn-wrap">
      <button class="spin-btn-bg" id="btn-spin" onclick="doSpin()"></button>
      <div class="spin-btn-txt" id="spin-btn-txt">крутить!</div>
    </div>
    <div class="ctr-row">
      <div class="ctr-num" id="ctr-num">0/2</div>
      <div class="won-pill" id="won-pill" style="display:none"></div>
    </div>
    <div class="info-row">
      <span id="info-name">фио</span>
      <span id="info-seat">номер раб. стола</span>
    </div>
  </div>
</div>

<!-- DONE -->
<div id="screen-done" class="screen">
  <div class="logo-wrap"><div class="logo-para"></div></div>
  <div class="done-mid">
    <div class="done-big">Ура!</div>
    <div class="done-card" id="done-card"></div>
    <div class="done-note">Ожидайте свой пак мерча,<br>вам доставят его на рабочий стол :)</div>
    <button class="btn-outline" onclick="goBack()">← следующий участник</button>
  </div>
  <div class="footer">департамент<br>цифрового бизнеса</div>
</div>

<!-- ADMIN -->
<div id="screen-admin" class="screen">
  <div class="admin-body">
    <span class="back-btn" onclick="goBack()">← назад</span>
    <div class="admin-title">Результаты</div>
    <div class="stat-grid" id="admin-stats"></div>
    <div class="act-row">
      <button class="btn-sm" onclick="exportCSV()">⬇ скачать CSV</button>
      <button class="btn-sm red" onclick="clearData()">очистить всё</button>

    <div class="tbl-box">

        <tbody id="admin-tbody"><tr><td colspan="5" style="text-align:center;padding:20px;opacity:.5">Загрузка...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

  {name:"Блокнот",img:IMGS.copybook},
];
const MAX=2;
const ITEM_H=260;

let user=null,spinning=false,won=[],used=0;

async function sbCheck(name,seat){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?name=eq.${encodeURIComponent(name)}&seat=eq.${encodeURIComponent(seat)}&select=id`,
    {headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});
  return(await r.json()).length>0;
}
async function sbInsert(row){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`,{
    method:"POST",
    headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"return=minimal"},
    body:JSON.stringify(row)
  });
  if(!r.ok)throw new Error(await r.text());
}
async function sbAll(){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=created_at.desc`,
    {headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});
  return r.json();
}
async function sbDel(){
  await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=neq.00000000-0000-0000-0000-000000000000`,
    {method:"DELETE",headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});
}

function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");window.scrollTo(0,0)}
function toast(msg,dur=2600){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),dur)}
function setErr(msg){const e=document.getElementById("login-error");e.textContent=msg;e.style.display=msg?"block":"none"}

async function doLogin(){
  const name=document.getElementById("inp-name").value.trim();
  const seat=document.getElementById("inp-seat").value.trim();
  if(!name||!seat){setErr("Заполни оба поля");return}
  setErr("");
  const btn=document.getElementById("btn-login");
  btn.disabled=true;btn.textContent="Проверяем...";
  try{
    if(await sbCheck(name,seat)){setErr("Этот участник уже прошёл розыгрыш.");btn.disabled=false;btn.textContent="получить штуки";return}
  }catch(e){setErr("Ошибка соединения. Проверь ключи Supabase.");btn.disabled=false;btn.textContent="получить штуки";return}
  user={name,seat};won=[];used=0;
  btn.disabled=false;btn.textContent="получить штуки";
  initSpin();show("screen-spin");
}

function buildReel(){
  const t=document.getElementById("reel-track");t.innerHTML="";
  for(let i=0;i<40;i++){
    const m=MERCH[i%MERCH.length];
    const d=document.createElement("div");d.className="reel-item";
    d.innerHTML=`<img src="${m.img}" alt="${m.name}">`;
    t.appendChild(d);
  }
}

function posReel(idx,anim,dur){
  const t=document.getElementById("reel-track");
  const oh=document.getElementById("reel-section").offsetHeight||400;
  const y=oh/2-ITEM_H/2-idx*ITEM_H;
  t.style.transition=anim?`transform ${dur}s cubic-bezier(0.23,1,0.32,1)`:"none";
  t.style.transform=`translateY(${y}px)`;
}

function updateUI(){
  document.getElementById("ctr-num").textContent=`${used}/${MAX}`;
  const pill=document.getElementById("won-pill");
  if(won.length>0){
    pill.style.display="flex";
    pill.innerHTML=won.map((w,i)=>(i>0?'<span class="won-sep"></span>':"")+`<span>${w.name}</span>`).join("");
  }else{pill.style.display="none"}
}

function setLabel(txt){document.getElementById("spin-btn-txt").textContent=txt}

function initSpin(){
  document.getElementById("spin-chip").textContent=`${user.name} · ${user.seat}`;
  document.getElementById("info-name").textContent=user.name;
  document.getElementById("info-seat").textContent=user.seat;
  updateUI();buildReel();posReel(0,false,0);
  document.getElementById("btn-spin").disabled=false;setLabel("крутить!");
}

function doSpin(){
  if(spinning||used>=MAX)return;
  spinning=true;document.getElementById("btn-spin").disabled=true;

  const total=40,rounds=5+Math.floor(Math.random()*3),target=Math.floor(Math.random()*total);
  const scroll=rounds*total+target,dur=2.6+rounds*0.11;

  posReel(0,false,0);
  requestAnimationFrame(()=>requestAnimationFrame(()=>posReel(scroll,true,dur)));

  setTimeout(()=>{
    const ri=((target%MERCH.length)+MERCH.length)%MERCH.length;
    const item=MERCH[ri];

    if(won.some(w=>w.name===item.name)){
      toast("Такой мерч уже есть! Крути ещё раз 🔄",3000);
      spinning=false;
      setTimeout(()=>{buildReel();posReel(0,false,0)},300);
      document.getElementById("btn-spin").disabled=false;
      return;
    }

    used++;won.push(item);updateUI();
    toast(`🎉 ${item.name}!`);

    if(used>=MAX){setLabel("Сохраняем...");setTimeout(finish,1000)}
    else{spinning=false;document.getElementById("btn-spin").disabled=false;setLabel("крутить ещё!")}
  },dur*1000+120);
}

async function finish(){
  try{
    await sbInsert({name:user.name,seat:user.seat,merch_1:won[0]?.name||null,merch_2:won[1]?.name||null});
  }catch(e){toast("Ошибка сохранения! Запишите мерч вручную.",5000)}
  document.getElementById("done-card").textContent=
    `${user.name}, номер стола — ${user.seat}. Вы выиграли: ${won.map(w=>w.name).join(", ")}`;
  show("screen-done");spinning=false;
}

async function showAdmin(){
  show("screen-admin");
  const rows=await sbAll();
  document.getElementById("admin-tbody").innerHTML=rows.length===0
    ?"<tr><td colspan='5' style='text-align:center;padding:20px;opacity:.5'>Нет данных</td></tr>"
    :rows.map(r=>`<tr><td>${r.name}</td><td>${r.seat}</td><td>${r.merch_1||"—"}</td><td>${r.merch_2||"—"}</td><td>${r.created_at?r.created_at.slice(0,10):"—"}</td></tr>`).join("");
  const items=rows.reduce((s,r)=>(s+(r.merch_1?1:0)+(r.merch_2?1:0)),0);
  document.getElementById("admin-stats").innerHTML=`
    <div class="stat-box"><div class="stat-lbl">Участников</div><div class="stat-val">${rows.length}</div></div>
    <div class="stat-box"><div class="stat-lbl">Позиций выдано</div><div class="stat-val">${items}</div></div>`;
}

async function exportCSV(){
  const rows=await sbAll();if(!rows.length){toast("Нет данных");return}
  let csv="ФИО,Место,Мерч 1,Мерч 2,Дата\n";
  rows.forEach(r=>csv+=`"${r.name}","${r.seat}","${r.merch_1||""}","${r.merch_2||""}","${r.created_at?r.created_at.slice(0,10):""}"
`);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download="merch_results.csv";a.click();toast("CSV скачан ✓");
}

async function clearData(){
  if(!confirm("Удалить ВСЕ результаты?"))return;
  await sbDel();toast("Данные удалены");showAdmin();
}

function goBack(){
  user=null;
  document.getElementById("inp-name").value="";
  document.getElementById("inp-seat").value="";
  show("screen-login");
}
</script>
</body>
</html>
